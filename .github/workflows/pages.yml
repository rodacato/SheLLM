name: Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress so a deploy always finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Copy assets into site/ so the landing page has its icons/logo
      - name: Copy assets
        run: |
          mkdir -p site/assets
          cp -r assets/favicon site/assets/favicon
          cp -r assets/logo site/assets/logo

      # Bundle OpenAPI spec and copy API docs into site/api/
      - name: Build API docs
        run: |
          npm run docs:build
          mkdir -p site/docs/api
          cp docs/index.html site/docs/index.html
          cp docs/api/bundled.json site/docs/api/bundled.json
          cp docs/api/logo.svg site/docs/api/logo.svg

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
