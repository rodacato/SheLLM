name: Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress so a deploy always finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Copy assets into site/ so the landing page has its icons/logo
      - name: Copy assets
        run: |
          mkdir -p site/assets
          cp -r assets/favicon site/assets/favicon
          cp -r assets/logo site/assets/logo

      # Build Redocly API docs into site/api/
      - name: Build API docs
        run: npx redocly build-docs docs/openapi.yaml --template docs/template.html -o site/api/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
