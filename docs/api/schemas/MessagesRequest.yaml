type: object
required: [model, messages, max_tokens]
properties:
  model:
    type: string
    example: claude
  messages:
    type: array
    minItems: 1
    items:
      $ref: "./AnthropicMessage.yaml"
  max_tokens:
    type: integer
    minimum: 1
    maximum: 128000
  system:
    type: string
    description: Optional system prompt
  stream:
    type: boolean
    description: Must be false (streaming not supported)
    enum: [false]
