<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SheLLM API Reference</title>
    <meta name="description" content="SheLLM REST API — OpenAI and Anthropic compatible endpoints for unified LLM access.">
    <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-dark-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-dark-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../img/favicon-dark-180.png">
    {{{redocHead}}}
    <style>
      /* ── Page background ── */
      body, html { background: #1A1E21 !important; }

      /* ── Main content panel background ── */
      [role="main"],
      .sc-fzoLsD,
      .menu-content + div { background: #1A1E21 !important; }

      /* ── Section headings ── */
      h1, h2, h3, h4, h5 { color: #FFFFFF !important; }

      /* ── Operation path in endpoint blocks ── */
      span[class*="path"] { color: #E5E7EB !important; }

      /* ── Tag group labels in sidebar ── */
      li[class*="group"] > label { color: #4B5563 !important; font-size: 0.7rem !important; letter-spacing: 0.1em !important; text-transform: uppercase !important; }

      /* ── Active sidebar item highlight ── */
      li[class*="active"] > a,
      li[class*="active"] > label { color: #FFFFFF !important; background: #2E3B44 !important; border-radius: 6px !important; }

      /* ── Property tables ── */
      tr { border-color: #2A3038 !important; }
      td { color: #E5E7EB !important; }

      /* ── Required badge ── */
      span[class*="required"] { color: #EF4444 !important; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #1A1E21; }
      ::-webkit-scrollbar-thumb { background: #2E3B44; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3b4d59; }
    </style>
  </head>
  <body>
    {{{redocBody}}}
  </body>
</html>
