<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SheLLM</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon/favicon-dark-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../../assets/favicon/favicon-dark-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/favicon/favicon-dark-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --surface:           #101417;
      --surface-container: #1c2023;
      --outline-variant:   #3b494c;
      --primary-container: #03e3ff;
      --on-primary:        #00363e;
      --on-surface:        #e0e3e7;
      --outline:           #849397;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--surface);
      color: var(--on-surface);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }

    .wordmark {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .prompt {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--primary-container);
      line-height: 1;
    }

    h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .tagline {
      font-size: 0.9375rem;
      color: var(--outline);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .cta-group {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 0;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: background-color 150ms linear, color 150ms linear;
    }

    .btn:active { opacity: 0.85; }

    .btn-primary {
      background: var(--primary-container);
      color: var(--on-primary);
    }
    .btn-primary:hover { background: #39eeff; }

    .btn-secondary {
      background: var(--surface-container);
      color: var(--on-surface);
      border: 1px solid var(--outline-variant);
    }
    .btn-secondary:hover { background: #262a2e; }

    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .meta {
      margin-top: 3rem;
      font-size: 0.75rem;
      font-family: 'Inter', monospace;
      color: var(--outline-variant);
    }

    .meta a {
      color: var(--primary-container);
      text-decoration: none;
    }
    .meta a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark">
      <span class="prompt">&gt;_</span>
      <h1>SheLLM</h1>
    </div>
    <p class="tagline">Your LLM services — unified as a REST API</p>

    <div class="cta-group">
      <a href="/docs/" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        API Docs
      </a>
      <a href="/admin/dashboard/" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        Admin Dashboard
      </a>
    </div>

    <p class="meta">v0.1.0 · <a href="/health">/health</a></p>
  </div>
</body>
</html>
